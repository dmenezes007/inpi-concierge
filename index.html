<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1351b4" />
    <title>INPI Concierge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <h1 class="hero-title">INPI Concierge</h1>
      </header>

      <section class="toolbar card">
        <div class="search-center-wrap">
          <div class="search-animated-ring">
            <svg class="search-icon lucide lucide-search sm:w-[22px] sm:h-[22px]" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
            </svg>
            <input id="searchInput" class="search-button-like" type="search" placeholder="Consulte a informação do seu interesse" />
          </div>
        </div>
        <div class="search-warning-wrap">
          <p class="search-warning">
            <span class="warning-dot"></span>
            <strong>AVISO:</strong> O INPI Concierge não utiliza recursos de IA. Procure por palavras-chave para encontrar a informação desejada.
          </p>
        </div>
        <div class="tema-buttons-wrap">
          <div id="temaButtons" class="tema-buttons"></div>
        </div>
      </section>

      <section class="stats-grid" id="statsGrid"></section>

      <section class="results card">
        <div class="results-head">
          <h2>Resultados</h2>
          <p id="resultInfo">Carregando base...</p>
        </div>
        <div id="resultsContainer" class="results-list"></div>
        <div class="actions">
          <button id="loadMoreBtn" class="btn" type="button">Carregar mais</button>
        </div>
      </section>
    </div>

    <template id="resultCardTemplate">
      <article class="result-card">
        <p class="result-meta"></p>
        <div class="result-body"></div>
        <p class="result-content result-guidance"></p>
        <p class="result-link-wrap"><a class="result-link-btn" target="_blank" rel="noopener noreferrer">Acessar fonte</a></p>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
